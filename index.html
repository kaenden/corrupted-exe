<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="data:," />
    <title>CORRUPTED.EXE</title>
    <style>
      html, body {
        margin: 0; padding: 0; background: #02030a; overflow: hidden;
        width: 100%; height: 100%; touch-action: none;
        -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
      }
      #game { width: 100vw; height: 100vh; }
      canvas { display: block; }

      /* Portrait on touch devices → cover the game with a rotate prompt (do NOT hide #game,
         or the WebGL canvas boots at 0×0 and stays black after rotating). */
      #rotate { display: none; }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate {
          display: flex; position: fixed; inset: 0; z-index: 9999;
          flex-direction: column; align-items: center; justify-content: center; gap: 14px;
          background: #02030a; color: #2affff; font-family: monospace; text-align: center;
          text-shadow: 0 0 10px #00ffff;
        }
        #rotate .ico { font-size: 56px; animation: spin 2.4s ease-in-out infinite; }
        #rotate small { color: #5b8a93; }
        @keyframes spin { 0%,60%,100% { transform: rotate(0); } 80% { transform: rotate(-90deg); } }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate">
      <div class="ico">⟳</div>
      <div>TELEFONU YATAY ÇEVİR</div>
      <small>rotate your device</small>
    </div>

    <!-- TEMP on-screen diagnostic (mobile has no console). Shows renderer/size + any JS error. -->
    <div id="diag"></div>
    <script>
      (function () {
        var d = document.getElementById('diag');
        d.style.cssText = 'position:fixed;top:0;left:0;z-index:99999;background:rgba(0,0,0,.7);' +
          'color:#3ff;font:10px/1.45 monospace;padding:4px 6px;max-width:100vw;white-space:pre-wrap';
        d.textContent = 'boot…';
        function err(m) { d.style.color = '#ff6b6b'; d.textContent = m; }
        window.addEventListener('error', function (e) {
          err('ERR: ' + (e.message || e) + ' @' + ((e.filename || '').split('/').pop()) + ':' + (e.lineno || ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          err('REJECT: ' + ((e.reason && e.reason.message) || e.reason || e));
        });
        window.__diag = function (m) { d.textContent = m; };
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
