<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- no-cache = re-validate index.html every load (304 if unchanged), so a stale cached page can
         never point at an old/removed JS bundle. Vite's hashed assets stay cache-safe. -->
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="./assets/images/robot.png" />
    <title>CORRUPTED.EXE</title>
    <!-- Portal SDK is injected here per BUILD by vite.config.js (transformIndexHtml):
           build:cg       → CrazyGames SDK v3   · build:playgama → Playgama Bridge
           plain build    → CrazyGames SDK (harmless off-portal) · build:poki → none (injected at runtime)
         A single static <head> tag per platform — no extra external scripts (keeps each portal's CSP/QA clean). -->
    <!--PLATFORM_SDK-->
    <style>
      /* Self-hosted Chakra Petch (latin subset, English-only UI) — NO external font-CDN request,
         so every shipped resource is first-party (CrazyGames QA prefers no uncontrolled fetches).
         Falls back to monospace until a face loads / if one fails. */
      @font-face { font-family: 'Chakra Petch'; font-style: normal; font-weight: 400; font-display: swap; src: url('./assets/fonts/chakrapetch-400.woff2') format('woff2'); }
      @font-face { font-family: 'Chakra Petch'; font-style: normal; font-weight: 500; font-display: swap; src: url('./assets/fonts/chakrapetch-500.woff2') format('woff2'); }
      @font-face { font-family: 'Chakra Petch'; font-style: normal; font-weight: 600; font-display: swap; src: url('./assets/fonts/chakrapetch-600.woff2') format('woff2'); }
      @font-face { font-family: 'Chakra Petch'; font-style: normal; font-weight: 700; font-display: swap; src: url('./assets/fonts/chakrapetch-700.woff2') format('woff2'); }
      html, body {
        margin: 0; padding: 0; background: #02030a; overflow: hidden;
        width: 100%; height: 100vh; height: 100dvh; touch-action: none;
        -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
      }
      /* 100dvh = the VISIBLE viewport (excludes the mobile browser toolbar) so the FIT canvas
         lands fully on-screen instead of running under the address bar. */
      #game { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; }
      canvas { display: block; margin: auto; max-width: 100%; max-height: 100%; }

      /* First-paint loader — shown INSTANTLY from static HTML (before the JS bundle parses) so the
         very first frame is a branded screen, never a "hung black rectangle". main.js removes it once
         Phaser's game boots (the in-engine boot curtain takes over from there). */
      #boot {
        position: fixed; inset: 0; z-index: 9000; display: flex;
        flex-direction: column; align-items: center; justify-content: center; gap: 18px;
        background: #02030a; font-family: 'Chakra Petch', monospace; text-align: center;
        transition: opacity .4s ease; pointer-events: none;
      }
      #boot .logo {
        font-size: 34px; font-weight: 700; letter-spacing: 4px; color: #4dff5a;
        text-shadow: 0 0 12px rgba(77,255,90,.55); animation: bootglitch 2.6s steps(1) infinite;
      }
      #boot .sub { font-size: 13px; letter-spacing: 2px; color: #2affff; opacity: .85; animation: bootpulse 1.3s ease-in-out infinite; }
      #boot .bar { width: 168px; height: 3px; background: rgba(42,255,255,.16); overflow: hidden; border-radius: 2px; }
      #boot .bar i { display: block; width: 40%; height: 100%; background: #2affff; box-shadow: 0 0 8px #2affff; animation: bootscan 1.1s ease-in-out infinite; }
      @keyframes bootpulse { 0%,100% { opacity: .35; } 50% { opacity: .9; } }
      @keyframes bootscan { 0% { transform: translateX(-110%); } 100% { transform: translateX(310%); } }
      @keyframes bootglitch { 0%,92%,100% { transform: none; text-shadow: 0 0 12px rgba(77,255,90,.55); }
        94% { transform: translateX(-2px); text-shadow: 2px 0 0 #ff2a55, -2px 0 0 #2affff; }
        96% { transform: translateX(2px); text-shadow: -2px 0 0 #ff2a55, 2px 0 0 #2affff; } }

      /* Portrait on touch devices → cover the game with a rotate prompt (do NOT hide #game,
         or the WebGL canvas boots at 0×0 and stays black after rotating). */
      #rotate { display: none; }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate {
          display: flex; position: fixed; inset: 0; z-index: 9999;
          flex-direction: column; align-items: center; justify-content: center; gap: 14px;
          background: #02030a; color: #2affff; font-family: monospace; text-align: center;
          text-shadow: 0 0 10px #00ffff;
        }
        #rotate .ico { font-size: 56px; animation: spin 2.4s ease-in-out infinite; }
        #rotate small { color: #5b8a93; }
        @keyframes spin { 0%,60%,100% { transform: rotate(0); } 80% { transform: rotate(-90deg); } }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="logo">CORRUPTED.EXE</div>
      <div class="bar"><i></i></div>
      <div class="sub">initializing simulation…</div>
    </div>
    <div id="game"></div>
    <div id="rotate">
      <div class="ico">⟳</div>
      <div>ROTATE TO LANDSCAPE</div>
      <small>tap once to go fullscreen</small>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
